<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Shopping - Fruits and Vegetables</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Virtual Shopping - Fruits and Vegetables</h1>
        <div class="items">
            <div class="item">
                <img src="apple.jpg" alt="Apple">
                <h2>Apple</h2>
                <p>Price: $0.50 each</p>
                <button class="add-to-cart" data-price="0.50">Add to Cart</button>
            </div>
            <div class="item">
                <img src="banana.jpg" alt="Banana">
                <h2>Banana</h2>
                <p>Price: $0.25 each</p>
                <button class="add-to-cart" data-price="0.25">Add to Cart</button>
            </div>
            <!-- Add more items here -->
        </div>
        <div class="cart">
            <h2>Your Cart</h2>
            <ul id="cart-items">
            </ul>
            <p>Total: $<span id="total">0.00</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
