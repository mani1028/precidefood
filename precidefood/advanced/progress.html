<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Progress Tracker</title>
    <link rel="stylesheet" href="progress.css">
</head>
<body>
    <div class="container">
        <h1>Diet Progress Tracker</h1>
        <div class="progress">
            <p>Total Calories Eaten: <span id="totalCalories">0</span></p>
            <p>Goal Calories: <span id="goalCalories">2000</span></p>
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <button id="addCalories">Add Calories</button>
    </div>
    <script src="progress.js"></script>
</body>
</html>
